<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GTM Pipeline Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{--bg:#0F172A;--bg2:#1E293B;--card:#1E293B;--bdr:rgba(255,255,255,.08);--bdr2:rgba(255,255,255,.15);--txt:#F1F5F9;--mut:#94A3B8;--r:10px;--rs:6px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--txt);font-size:13px;line-height:1.5}
.wrap{max-width:1600px;margin:0 auto;padding:20px}
.ptitle{font-size:22px;font-weight:600;margin-bottom:3px}
.psub{font-size:12px;color:var(--mut);margin-bottom:1.2rem}
.sec{font-size:10px;font-weight:600;color:var(--mut);text-transform:uppercase;letter-spacing:.07em;margin:1rem 0 .45rem;border-bottom:1px solid var(--bdr);padding-bottom:4px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.g8{display:grid;grid-template-columns:repeat(8,minmax(0,1fr));gap:6px;margin-bottom:.9rem}
.g7{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:6px;margin-bottom:.9rem}
@media(max-width:1100px){.g8{grid-template-columns:repeat(4,1fr)}.g7{grid-template-columns:repeat(4,1fr)}.g2{grid-template-columns:1fr}}
@media(max-width:600px){.g8{grid-template-columns:repeat(2,1fr)}}
.card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:12px 14px}
.ctitle{font-size:10px;font-weight:600;color:var(--mut);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.kpi{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--rs);padding:10px 12px}
.kpi.hi{border-color:var(--bdr2)}
.kl{font-size:9px;color:var(--mut);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.kv{font-size:16px;font-weight:600}
.ks{font-size:10px;color:var(--mut);margin-top:2px}
.tw{overflow-x:auto}
.tbl{width:100%;border-collapse:collapse;font-size:11px;min-width:600px}
.tbl thead tr{background:rgba(255,255,255,.04)}
.tbl th{font-size:9px;font-weight:600;color:var(--mut);text-transform:uppercase;letter-spacing:.04em;padding:6px 8px;text-align:right;border-bottom:1px solid var(--bdr);white-space:nowrap}
.tbl th:first-child{text-align:left}
.tbl th.grp{text-align:center;border-left:1px solid var(--bdr2)}
.tbl td{padding:6px 8px;text-align:right;border-bottom:1px solid var(--bdr);color:var(--txt)}
.tbl td:first-child{text-align:left;font-weight:500}
.tbl td.grp-l{border-left:1px solid var(--bdr2)}
.tbl tr:last-child td{border-bottom:none}
.tbl tfoot td{font-weight:600;background:rgba(255,255,255,.04);font-size:10px}
.tbl tr:hover td{background:rgba(255,255,255,.03)}
.tag{display:inline-block;padding:2px 6px;border-radius:20px;font-size:10px;font-weight:600}
.mb{display:inline-block;padding:1px 5px;border-radius:8px;font-size:8px;background:#1D4ED822;color:#60A5FA;border:1px solid #1D4ED844;margin-left:3px}
.tb{display:inline-block;padding:1px 5px;border-radius:8px;font-size:8px;background:#92400E33;color:#FCD34D;border:1px solid #92400E44;margin-left:3px}
.ein{background:rgba(255,255,255,.06);border:1px solid var(--bdr2);border-radius:5px;padding:3px 5px;font-size:10px;color:var(--txt);width:68px;text-align:center;font-family:inherit}
.ein:focus{outline:none;border-color:#3B82F6;background:rgba(59,130,246,.1)}
.ein-fc{border-color:#7C3AED55}
.ein-fc:focus{border-color:#A78BFA}
.ein-act{border-color:#16A34A44}
.ein-act:focus{border-color:#22C55E}
.mgr td{color:var(--mut)!important;font-style:italic;background:rgba(255,255,255,.02)!important}
.podtitle{font-size:15px;font-weight:600;padding:9px 14px;background:var(--bg2);border-radius:var(--r);border-left:4px solid;margin:1.4rem 0 .5rem;display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.podmeta{font-size:11px;font-weight:400;color:var(--mut)}
.wkcard{border:1px solid var(--bdr);border-radius:var(--rs);margin-bottom:5px;overflow:hidden}
.wkhdr{display:flex;align-items:center;gap:9px;padding:9px 12px;cursor:pointer;background:var(--bg2);user-select:none}
.wkhdr:hover{background:rgba(255,255,255,.04)}
.wkdot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.wki{flex:1}
.wkn{font-size:12px;font-weight:500}
.wks2{font-size:10px;color:var(--mut)}
.wkst{display:flex;gap:14px}
.ws{text-align:right}
.wsl{font-size:8px;color:var(--mut);text-transform:uppercase;letter-spacing:.04em}
.wsv{font-size:12px;font-weight:600;margin-top:1px}
.chev{font-size:10px;color:var(--mut);transition:transform .2s;margin-left:5px}
.chev.op{transform:rotate(180deg)}
.wkbody{display:none;border-top:1px solid var(--bdr)}
.wkbody.op{display:block}
.pcts{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.divider{border:none;border-top:1px solid var(--bdr2);margin:1.8rem 0}
.chwrap{position:relative;width:100%}
.banner{background:var(--bg2);border:1px solid var(--bdr2);border-radius:var(--r);padding:16px 18px;margin-bottom:1rem}
.banner h2{font-size:10px;font-weight:600;color:var(--mut);text-transform:uppercase;letter-spacing:.08em;margin-bottom:11px}
</style>
</head>
<body>
<div class="wrap">
<div class="ptitle">GTM Pipeline Dashboard</div>
<div class="psub">All Pods &middot; Prabhjeet &middot; Vaibhav &middot; Shikhar &middot; Neeraj (SDR Director) &middot; Rajveer &middot; April 2025</div>
<div class="banner">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:11px">
    <h2 style="margin:0">Master Summary</h2>
    <div style="display:flex;gap:8px;align-items:center">
      <button onclick="exportData()" style="background:#1E3A5F;color:#60A5FA;border:1px solid #60A5FA55;border-radius:6px;padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer">&#8595; Export data</button>
      <button onclick="document.getElementById('importFile').click()" style="background:#14532D33;color:#22C55E;border:1px solid #22C55E55;border-radius:6px;padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer">&#8593; Import data</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(this)">
      <span id="importMsg" style="font-size:10px;color:#22C55E;display:none">Loaded!</span>
    </div>
  </div>
  <div class="g7" id="mKPI"></div>
</div>
<div class="g2">
  <div class="card"><div class="ctitle">Target &middot; Projected &middot; Forecasted &middot; Actuals by pod</div><div class="chwrap" style="height:180px"><canvas id="cBar"></canvas></div></div>
  <div class="card"><div class="ctitle">Rooftops by RAG</div><div class="chwrap" style="height:180px"><canvas id="cPie"></canvas></div></div>
</div>
<div class="sec">Pod comparison</div>
<div class="card" style="padding:0;overflow:hidden;margin-bottom:1rem"><div class="tw"><table class="tbl" id="podTbl"></table></div></div>
<hr class="divider">
<div id="pods"></div>
</div>
<script>
var PRICE=18000,CONV={darkRed:.01,red:.01,amber:.20,green:.50};
var WKP={w1:.20,w2:.25,w3:.30,w4:.25};
var WKS=[
  {id:"w1",label:"Week 1",dates:"6-10 Apr", done:true, clr:"#22C55E",bg:"#14532D",tc:"#BBF7D0"},
  {id:"w2",label:"Week 2",dates:"14-17 Apr",done:false,clr:"#F59E0B",bg:"#78350F",tc:"#FDE68A"},
  {id:"w3",label:"Week 3",dates:"22-25 Apr",done:false,clr:"#A78BFA",bg:"#4C1D95",tc:"#DDD6FE"},
  {id:"w4",label:"Week 4",dates:"28 Apr+",  done:false,clr:"#60A5FA",bg:"#1E3A5F",tc:"#BFDBFE"}
];
var BKTS=[
  {id:"darkRed",label:"Dark Red",tc:"#FCA5A5"},
  {id:"red",    label:"Red",     tc:"#F87171"},
  {id:"amber",  label:"Amber",   tc:"#FCD34D"},
  {id:"green",  label:"Green",   tc:"#86EFAC"}
];
var BKC=["#7F1D1D","#EF4444","#F59E0B","#22C55E"];
var PC=["#3B82F6","#8B5CF6","#F97316","#22C55E","#EF4444"];

var PODS=[
  {id:"p1",label:"Prabhjeet's Pod",heading:"Prabhjeet's Pod",color:PC[0],sdrs:[
    {name:"Dixant",    tgt:210000,mgr:false,rt:{darkRed:0,red:0,amber:0,green:0}},
    {name:"Vaansh",    tgt:210000,mgr:false,rt:{darkRed:0,red:0,amber:0,green:0}},
    {name:"Simran",    tgt:210000,mgr:false,rt:{darkRed:0,red:0,amber:0,green:0}},
    {name:"Rakshit",   tgt:210000,mgr:false,rt:{darkRed:0,red:0,amber:0,green:0}},
    {name:"Drishti",   tgt:210000,mgr:false,rt:{darkRed:0,red:0,amber:0,green:0}},
    {name:"Sivani",    tgt:210000,mgr:false,rt:{darkRed:0,red:0,amber:0,green:0}},
    {name:"Prabhjeet", tgt:90000, mgr:false,rt:{darkRed:0,red:0,amber:0,green:0}}
  ]},
  {id:"p2",label:"Vaibhav's Pod",heading:"Vaibhav's Pod",color:PC[1],sdrs:[
    {name:"Shefali",  tgt:210000,mgr:false,rt:{darkRed:0,red:0,amber:0,green:0}},
    {name:"Utsav",    tgt:210000,mgr:false,rt:{darkRed:0,red:0,amber:0,green:0}},
    {name:"Abhijeet", tgt:210000,mgr:false,rt:{darkRed:0,red:0,amber:0,green:0}},
    {name:"Shadman",  tgt:210000,mgr:false,rt:{darkRed:0,red:0,amber:0,green:0}},
    {name:"Anurag",   tgt:210000,mgr:false,rt:{darkRed:0,red:0,amber:0,green:0}},
    {name:"Vaibhav",  tgt:0,     mgr:true, rt:{darkRed:0,red:0,amber:0,green:0}}
  ]},
  {id:"p3",label:"Shikhar's Pod",heading:"Shikhar's Pod",color:PC[2],sdrs:[
    {name:"Viplove",  tgt:210000,mgr:false,rt:{darkRed:0,red:0,amber:0,green:0}},
    {name:"Anisha",   tgt:210000,mgr:false,rt:{darkRed:0,red:0,amber:0,green:0}},
    {name:"Khubaib",  tgt:210000,mgr:false,rt:{darkRed:0,red:0,amber:0,green:0}},
    {name:"Abhishek", tgt:210000,mgr:false,rt:{darkRed:0,red:0,amber:0,green:0}}
  ]},
  {id:"p4",label:"Neeraj's Pod",heading:"Neeraj's Pod (SDR Director: Neeraj)",color:PC[3],sdrs:[
    {name:"Kshitij Agarwal",  tgt:210000,mgr:false,rt:{darkRed:0,red:0,amber:0,green:0}},
    {name:"Muskan Makkar",    tgt:210000,mgr:false,rt:{darkRed:0,red:0,amber:0,green:0}},
    {name:"Ketan Srivastava", tgt:210000,mgr:false,rt:{darkRed:0,red:0,amber:0,green:0}},
    {name:"Rishabh Sharma",   tgt:210000,mgr:false,rt:{darkRed:0,red:0,amber:0,green:0}},
    {name:"Shikhar Paroha",   tgt:210000,mgr:false,rt:{darkRed:0,red:0,amber:0,green:0}},
    {name:"Vikram Choudhary", tgt:210000,mgr:false,rt:{darkRed:0,red:0,amber:0,green:0}},
    {name:"Nitish Malik",     tgt:210000,mgr:false,rt:{darkRed:0,red:0,amber:0,green:0}},
    {name:"Sanamdeep",        tgt:210000,mgr:false,rt:{darkRed:0,red:0,amber:0,green:0}}
  ]},
  {id:"p5",label:"Rajveer's Pod",heading:"Rajveer's Pod",color:PC[4],sdrs:[
    {name:"Rajveer", tgt:90000, mgr:false,rt:{darkRed:0,red:0,amber:0,green:0}},
    {name:"Namrata", tgt:210000,mgr:false,rt:{darkRed:0,red:0,amber:0,green:0}},
    {name:"Naman",   tgt:210000,mgr:false,rt:{darkRed:0,red:0,amber:0,green:0}},
    {name:"Jayant",  tgt:210000,mgr:false,rt:{darkRed:0,red:0,amber:0,green:0}},
    {name:"Ashish",  tgt:210000,mgr:false,rt:{darkRed:0,red:0,amber:0,green:0}}
  ]}
];

// actuals[podId][wkId][sdrName], forecasts[podId][wkId][sdrName]
var actuals={}, forecasts={};
PODS.forEach(function(p){
  actuals[p.id]={}; forecasts[p.id]={};
  WKS.forEach(function(w){
    actuals[p.id][w.id]={}; forecasts[p.id][w.id]={};
    p.sdrs.forEach(function(s){ actuals[p.id][w.id][s.name]=0; forecasts[p.id][w.id][s.name]=0; });
  });
});

function save(){
  try{
    var d={pods:PODS.map(function(p){return{id:p.id,sdrs:p.sdrs.map(function(s){return{name:s.name,rt:{darkRed:s.rt.darkRed,red:s.rt.red,amber:s.rt.amber,green:s.rt.green}};})};}),actuals:actuals,forecasts:forecasts};
    localStorage.setItem('gtm_v4',JSON.stringify(d));
  }catch(e){}
}
function load(){
  try{
    var raw=localStorage.getItem('gtm_v4');
    if(!raw)return;
    var d=JSON.parse(raw);
    d.pods.forEach(function(pd){
      var pod=PODS.filter(function(p){return p.id===pd.id;})[0];
      if(!pod)return;
      pd.sdrs.forEach(function(sd){
        var s=pod.sdrs.filter(function(x){return x.name===sd.name;})[0];
        if(s){s.rt.darkRed=sd.rt.darkRed||0;s.rt.red=sd.rt.red||0;s.rt.amber=sd.rt.amber||0;s.rt.green=sd.rt.green||0;}
      });
    });
    if(d.actuals){
      Object.keys(d.actuals).forEach(function(pid){
        if(!actuals[pid])return;
        Object.keys(d.actuals[pid]).forEach(function(wid){
          if(!actuals[pid][wid])return;
          Object.keys(d.actuals[pid][wid]).forEach(function(n){ actuals[pid][wid][n]=d.actuals[pid][wid][n]||0; });
        });
      });
    }
    if(d.forecasts){
      Object.keys(d.forecasts).forEach(function(pid){
        if(!forecasts[pid])return;
        Object.keys(d.forecasts[pid]).forEach(function(wid){
          if(!forecasts[pid][wid])return;
          Object.keys(d.forecasts[pid][wid]).forEach(function(n){ forecasts[pid][wid][n]=d.forecasts[pid][wid][n]||0; });
        });
      });
    }
  }catch(e){}
}
load();

function fmt(v){return '$'+Math.round(v).toLocaleString();}
function fmtK(v){return v>=1e6?'$'+(v/1e6).toFixed(1)+'M':v===0?'$0':'$'+Math.round(v/1000)+'K';}
function pct(a,b){return b?Math.round(a/b*100):0;}
function gc(v){return v>=0?'#22C55E':'#EF4444';}
function pcol(p){return p>=100?'#22C55E':p>=60?'#F59E0B':'#EF4444';}
function pbg(p){return p>=100?'#14532D33':p>=60?'#78350F33':'#7F1D1D33';}
function tag(p,lbl){return '<span class="tag" style="background:'+pbg(p)+';color:'+pcol(p)+'">'+(lbl||p+'%')+'</span>';}
function tagxs(p,lbl){return '<span class="tag" style="font-size:9px;padding:1px 5px;background:'+pbg(p)+';color:'+pcol(p)+'">'+(lbl||p+'%')+'</span>';}
function refTag(){return '<span class="tag" style="background:#1D4ED822;color:#60A5FA">ref</span>';}

// Core calcs
function sdrARR(s,b){return s.rt[b]*CONV[b]*PRICE;}
function sdrProj(s){return BKTS.reduce(function(t,b){return t+sdrARR(s,b.id);},0);}
function sdrWkProj(wid,s){return Math.round(sdrProj(s)*WKP[wid]);}
function sdrActsAll(pid,s){return WKS.reduce(function(t,w){return t+(actuals[pid][w.id][s.name]||0);},0);}
function sdrFcstAll(pid,s){return WKS.filter(function(w){return !w.done;}).reduce(function(t,w){return t+(forecasts[pid][w.id][s.name]||0);},0);}
function sdrFcstWk(pid,wid,s){return forecasts[pid][wid][s.name]||0;}

function podSDRs(p){return p.sdrs.filter(function(s){return !s.mgr;});}
function podAllSDRs(p){return p.sdrs;}
function podProjAll(p){return p.sdrs.reduce(function(t,s){return t+sdrProj(s);},0);}
function podActsAll(p){return WKS.reduce(function(t,w){return t+p.sdrs.reduce(function(tt,s){return tt+(actuals[p.id][w.id][s.name]||0);},0);},0);}
function podFcstAll(p){return WKS.filter(function(w){return !w.done;}).reduce(function(t,w){return t+p.sdrs.reduce(function(tt,s){return tt+(forecasts[p.id][w.id][s.name]||0);},0);},0);}
function podProj(p){return podSDRs(p).reduce(function(t,s){return t+sdrProj(s);},0);}
function podTgt(p){return podSDRs(p).reduce(function(t,s){return t+s.tgt;},0);}
function podARR(p,b){return p.sdrs.reduce(function(t,s){return t+s.rt[b];},0)*CONV[b]*PRICE;}
function podRT(p,b){return p.sdrs.reduce(function(t,s){return t+s.rt[b];},0);}
function podActs(p){return WKS.reduce(function(t,w){return t+podSDRs(p).reduce(function(tt,s){return tt+(actuals[p.id][w.id][s.name]||0);},0);},0);}
function podFcst(p){return WKS.filter(function(w){return !w.done;}).reduce(function(t,w){return t+podSDRs(p).reduce(function(tt,s){return tt+(forecasts[p.id][w.id][s.name]||0);},0);},0);}
function wkPodAct(p,wid){return podSDRs(p).reduce(function(t,s){return t+(actuals[p.id][wid][s.name]||0);},0);}
function wkPodFcst(p,wid){return podSDRs(p).reduce(function(t,s){return t+(forecasts[p.id][wid][s.name]||0);},0);}

function mastProj(){return PODS.reduce(function(t,p){return t+podProj(p);},0);}
function mastTgt(){return PODS.reduce(function(t,p){return t+podTgt(p);},0);}
function mastActs(){return PODS.reduce(function(t,p){return t+podActs(p);},0);}
function mastFcst(){return PODS.reduce(function(t,p){return t+podFcst(p);},0);}
function mastRT(b){return PODS.reduce(function(t,p){return t+podRT(p,b);},0);}

// Master KPI
function renderMKPI(){
  var mp=mastProj(),mt=mastTgt(),gap=mp-mt,ma=mastActs(),arrGap=mt-ma,mf=mastFcst(),fgap=mf-mt;
  var nS=PODS.reduce(function(t,p){return t+podSDRs(p).length;},0);
  var cards=[
    {id:'mk-tgt', l:'Total target',        v:fmt(mt),  s:nS+' active SDRs'},
    {id:'mk-prj', l:'Total projected ARR', v:fmt(mp),  s:pct(mp,mt)+'% of target', vc:mp>=mt?'#22C55E':'#F59E0B'},
    {id:'mk-pgap',l:'Projected gap',       v:(gap>=0?'+':'')+fmt(gap), s:gap>=0?'Ahead':'Behind', vc:gc(gap)},
    {id:'mk-act', l:'Total actuals',       v:fmt(ma),  s:pct(ma,mt)+'% collected', vc:'#60A5FA'},
    {id:'mk-agap',l:'ARR to close',        v:fmt(arrGap), s:arrGap<=0?'All hit!':'Remaining', vc:arrGap<=0?'#22C55E':'#EF4444'},
    {id:'mk-fct', l:'Forecasted ARR',      v:fmt(mf),  s:pct(mf,mt)+'% of target', vc:'#A78BFA'},
    {id:'mk-pods',l:'Active pods',         v:'5',      s:'all managers'},
    {id:'mk-prog',l:'ARR from programmes',  v:fmt(totalProgARR()), s:'across all pods', vc:'#22C55E'}
  ];
  document.getElementById('mKPI').innerHTML=cards.map(function(c){
    return '<div class="kpi hi"><div class="kl">'+c.l+'</div><div class="kv" id="'+c.id+'" style="color:'+(c.vc||'var(--txt)')+'">'+c.v+'</div><div class="ks" id="'+c.id+'-s">'+c.s+'</div></div>';
  }).join('');
}

// Pod comparison table
function renderPodTbl(){
  var rows=PODS.map(function(p){
    var proj=Math.round(podProjAll(p)),tgt=podTgt(p),g=proj-tgt,pp=pct(proj,tgt);
    var act=podActsAll(p),ag=tgt-act,pa=pct(act,tgt);
    var fc=podFcstAll(p),fg=fc-tgt,pf=pct(fc,tgt);
    return '<tr>'+
      '<td><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+p.color+';margin-right:5px;vertical-align:middle"></span>'+p.label+'</td>'+
      '<td style="color:var(--mut)">'+fmt(tgt)+'</td>'+
      '<td style="color:#60A5FA;font-weight:600" id="ps-proj-'+p.id+'">'+fmt(proj)+'</td>'+
      '<td style="color:'+gc(g)+'" id="ps-pgap-'+p.id+'">'+(g>=0?'+':'')+fmt(g)+'</td>'+
      '<td style="color:#86EFAC" id="ps-act-'+p.id+'">'+fmt(act)+'</td>'+
      '<td style="color:'+(ag>0?'#EF4444':'#22C55E')+'" id="ps-agap-'+p.id+'">'+(ag>0?fmt(ag):'Hit!')+'</td>'+
      '<td style="color:#A78BFA" id="ps-fct-'+p.id+'">'+fmt(fc)+'</td>'+
      '<td id="ps-pp-'+p.id+'">'+tag(pp)+'</td>'+
      '<td id="ps-pa-'+p.id+'">'+tag(pa)+'</td>'+
      '<td id="ps-pf-'+p.id+'">'+tag(pf)+'</td>'+
      '</tr>';

// Render all pods
function renderPods(){
  var html='';
  PODS.forEach(function(pod,pi){
    if(pi>0)html+='<hr class="divider">';
    html+=podHTML(pod);
  });
  document.getElementById('pods').innerHTML=html;
  // restore saved inputs
  PODS.forEach(function(p){
    p.sdrs.forEach(function(s,si){
      BKTS.forEach(function(b){
        var el=document.getElementById('rt-'+p.id+'-'+si+'-'+b.id);
        if(el)el.value=s.rt[b.id]||'';
      });
      WKS.forEach(function(w){
        var ae=document.getElementById('act-'+p.id+'-'+w.id+'-'+s.name);
        if(ae)ae.value=actuals[p.id][w.id][s.name]||'';
        if(!w.done){
          var fe=document.getElementById('fc-'+p.id+'-'+w.id+'-'+s.name);
          if(fe)fe.value=forecasts[p.id][w.id][s.name]||'';
        }
      });
    });
  });
}

// Edit handlers
function editRT(pid,si,bkt,val){
  var pod=PODS.filter(function(p){return p.id===pid;})[0];
  pod.sdrs[si].rt[bkt]=parseInt(val)||0;
  var s=pod.sdrs[si];
  var ae=document.getElementById('rta-'+pid+'-'+si+'-'+bkt);if(ae)ae.textContent=fmt(sdrARR(s,bkt));
  var te=document.getElementById('rtt-'+pid+'-'+si);if(te)te.textContent=fmt(Math.round(sdrProj(s)));
  var rre=document.getElementById('rft-'+pid+'-'+bkt);if(rre)rre.textContent=podRT(pod,bkt);
  var rae=document.getElementById('rfta-'+pid+'-'+bkt);if(rae)rae.textContent=fmt(podARR(pod,bkt));
  var rte=document.getElementById('rft-'+pid+'-total');if(rte)rte.textContent=fmt(Math.round(pod.sdrs.reduce(function(t,s2){return t+sdrProj(s2);},0)));
  refreshSDRRow(pod,si);
  refreshPodFooter(pod);
  WKS.forEach(function(wk){
    var wp2=podSDRs(pod).reduce(function(t,s2){return t+sdrWkProj(wk.id,s2);},0);
    var el=document.getElementById('wh-proj-'+pid+'-'+wk.id);if(el)el.textContent=fmtK(wp2);
  });
  save();refreshMaster();
}

function updFc(pid,wid,name,mgrStr,val){
  forecasts[pid][wid][name]=parseFloat(val.replace(/[$,]/g,''))||0;
  var isMgr=mgrStr==='true';
  if(isMgr){save();return;}
  var pod=PODS.filter(function(p){return p.id===pid;})[0];
  var si=pod.sdrs.map(function(s){return s.name;}).indexOf(name);
  var wFc=wkPodFcst(pod,wid);
  var hf=document.getElementById('wh-fc-'+pid+'-'+wid);if(hf)hf.textContent=fmtK(wFc);
  var tf=document.getElementById('wt-fc-'+pid+'-'+wid);if(tf)tf.textContent=fmt(wFc);
  var sfc=document.getElementById('sfc-'+pid+'-'+wid+'-'+si);if(sfc)sfc.textContent=fmt(forecasts[pid][wid][name]);
  var ff=document.getElementById('ftfc-'+pid+'-'+wid);if(ff)ff.textContent=fmt(wFc);
  if(si>=0)refreshSDRRow(pod,si);
  refreshPodFooter(pod);
  save();refreshMaster();
}

function updAct(pid,wid,name,mgrStr,val){
  actuals[pid][wid][name]=parseFloat(val.replace(/[$,]/g,''))||0;
  var isMgr=mgrStr==='true';
  if(isMgr){save();return;}
  var pod=PODS.filter(function(p){return p.id===pid;})[0];
  var wTgt=podSDRs(pod).reduce(function(t,s){return t+s.tgt/4;},0);
  var wAct=wkPodAct(pod,wid),wGap=wTgt-wAct,wp=pct(wAct,wTgt);
  var fcol=wp>=100?'#22C55E':wp>=60?'#F59E0B':'#EF4444';
  var ha=document.getElementById('wh-act-'+pid+'-'+wid);if(ha)ha.textContent=fmtK(wAct);
  var hg=document.getElementById('wh-gap-'+pid+'-'+wid);if(hg){hg.textContent=wGap>0?fmt(wGap):'Hit!';hg.style.color=wGap>0?'#EF4444':'#22C55E';}
  var hp=document.getElementById('wh-pct-'+pid+'-'+wid);if(hp){hp.textContent=wp+'%';hp.style.color=fcol;}
  var ta=document.getElementById('wt-act-'+pid+'-'+wid);if(ta)ta.textContent=fmt(wAct);
  var tg=document.getElementById('wt-gap-'+pid+'-'+wid);if(tg){tg.textContent=wGap>0?fmt(wGap):'Hit!';tg.style.color=wGap>0?'#EF4444':'#22C55E';}
  var tp=document.getElementById('wt-pct-'+pid+'-'+wid);if(tp)tp.innerHTML=tag(wp);
  var s=pod.sdrs.filter(function(x){return x.name===name;})[0];
  if(s){
    var wt=s.tgt/4,a2=actuals[pid][wid][name],sp=pct(a2,wt);
    var gEl=document.getElementById('wkg-'+pid+'-'+wid+'-'+name);if(gEl)gEl.textContent=fmt(Math.max(0,wt-a2));
    var pEl=document.getElementById('wkp-'+pid+'-'+wid+'-'+name);if(pEl)pEl.innerHTML=tag(sp);
  }
  var si=pod.sdrs.map(function(s2){return s2.name;}).indexOf(name);
  if(si>=0)refreshSDRRow(pod,si);
  refreshPodFooter(pod);
  var ta3=podActs(pod),ag=podTgt(pod)-ta3;
  var psa=document.getElementById('ps-act-'+pid);if(psa)psa.textContent=fmt(ta3);
  var psag=document.getElementById('ps-agap-'+pid);if(psag){psag.textContent=ag>0?fmt(ag):'Hit!';psag.style.color=ag>0?'#EF4444':'#22C55E';}
  var pspa=document.getElementById('ps-pa-'+pid);if(pspa)pspa.innerHTML=tag(pct(ta3,podTgt(pod)));
  save();refreshMaster();
}

function refreshSDRRow(pod,si){
  var s=pod.sdrs[si],m=s.mgr,pid=pod.id;
  var f=Math.round(sdrProj(s)),g2=m?null:f-s.tgt,pp2=m?null:pct(f,s.tgt);
  var sa=sdrActsAll(pid,s),pa=m?null:pct(sa,s.tgt);
  var sf=sdrFcstAll(pid,s),pf=m?null:pct(sf,s.tgt);
  var rows=document.querySelectorAll('#sb-'+pid+' tr');
  if(rows[si]){
    var cells=rows[si].querySelectorAll('td');
    var bi={darkRed:2,red:3,amber:4,green:5};
    BKTS.forEach(function(b){if(cells[bi[b.id]])cells[bi[b.id]].textContent=fmt(sdrARR(s,b.id));});
  }
  var spe=document.getElementById('sp-'+pid+'-'+si);if(spe)spe.textContent=fmt(f);
  var sge=document.getElementById('spg-'+pid+'-'+si);if(sge&&!m){sge.textContent=(g2>=0?'+':'')+fmt(g2);sge.style.color=gc(g2);}
  WKS.filter(function(w){return !w.done;}).forEach(function(w){
    var sfc=document.getElementById('sfc-'+pid+'-'+w.id+'-'+si);
    if(sfc&&!m)sfc.textContent=fmt(sdrFcstWk(pid,w.id,s));
  });
  var sfte=document.getElementById('sft-'+pid+'-'+si);if(sfte)sfte.textContent=m?'--':fmt(sf);
  var sate=document.getElementById('sat-'+pid+'-'+si);if(sate)sate.textContent=m?'--':fmt(sa);
  var spcts=document.getElementById('spcts-'+pid+'-'+si);
  if(spcts&&!m)spcts.innerHTML='<div class="pcts">'+tagxs(pp2,'P:'+pp2+'%')+tagxs(pf,'F:'+pf+'%')+'</div>';
}

function refreshPodFooter(pod){
  var pid=pod.id,tp=Math.round(podProj(pod)),tt=podTgt(pod),pg=tp-tt,pp=pct(tp,tt);
  var ta=podActs(pod),pa=pct(ta,tt),tf=podFcst(pod),pf=pct(tf,tt);
  BKTS.forEach(function(b){
    var e=document.getElementById('fa-'+pid+'-'+b.id);if(e)e.textContent=fmt(podARR(pod,b.id));
  });
  var ftp=document.getElementById('ft-proj-'+pid);if(ftp)ftp.textContent=fmt(tp);
  var fpg=document.getElementById('ft-pg-'+pid);if(fpg){fpg.textContent=(pg>=0?'+':'')+fmt(pg);fpg.style.color=gc(pg);}
  WKS.filter(function(w){return !w.done;}).forEach(function(w){
    var ff=document.getElementById('ftfc-'+pid+'-'+w.id);if(ff)ff.textContent=fmt(wkPodFcst(pod,w.id));
  });
  var ftf=document.getElementById('ft-fct-'+pid);if(ftf)ftf.textContent=fmt(tf);
  var fta=document.getElementById('ft-act-'+pid);if(fta)fta.textContent=fmt(ta);
  var ftp2=document.getElementById('ft-pcts-'+pid);if(ftp2)ftp2.innerHTML='<div class="pcts">'+tagxs(pp,'P:'+pp+'%')+tagxs(pf,'F:'+pf+'%')+'</div>';
  var ptproj=document.getElementById('ptproj-'+pid);if(ptproj)ptproj.textContent=fmt(tp);
  var ptfct=document.getElementById('ptfct-'+pid);if(ptfct)ptfct.textContent=fmt(tf);
  var ptact=document.getElementById('ptact-'+pid);if(ptact)ptact.textContent=fmt(ta);
  var ptgap=document.getElementById('ptgap-'+pid);if(ptgap){ptgap.textContent=(pg>=0?'+':'')+fmt(pg);ptgap.style.color=gc(pg);}
  var psf=document.getElementById('ps-proj-'+pid);if(psf)psf.textContent=fmt(tp);
  var psg=document.getElementById('ps-pgap-'+pid);if(psg){psg.textContent=(pg>=0?'+':'')+fmt(pg);psg.style.color=gc(pg);}
  var psft=document.getElementById('ps-fct-'+pid);if(psft)psft.textContent=fmt(tf);
  var psfg=document.getElementById('ps-fgap-'+pid);if(psfg){psfg.textContent=((tf-tt)>=0?'+':'')+fmt(tf-tt);psfg.style.color=gc(tf-tt);}
  var pspp=document.getElementById('ps-pp-'+pid);if(pspp)pspp.innerHTML=tag(pp);
  var pspa=document.getElementById('ps-pa-'+pid);if(pspa)pspa.innerHTML=tag(pa);
  var pspf=document.getElementById('ps-pf-'+pid);if(pspf)pspf.innerHTML=tag(pf);
}

function refreshMaster(){
  var mp=mastProj(),mt=mastTgt(),mg=mp-mt,ma=mastActs(),mag=mt-ma,mf=mastFcst(),mfg=mf-mt;
  function upd(id,v,c){var e=document.getElementById(id);if(e){e.textContent=v;if(c)e.style.color=c;}}

// ARR from each programme: progARR[podId][progNum] = number
var progARR = {};
Object.keys(PROGS).forEach(function(pid){
  progARR[pid] = {};
  PROGS[pid].forEach(function(p){ progARR[pid][p.num] = 0; });
});
// Programme status overrides
var progStatus = {};
Object.keys(PROGS).forEach(function(pid){
  progStatus[pid] = {};
  PROGS[pid].forEach(function(p){ progStatus[pid][p.num] = p.status; });
});

function totalProgARR(){
  var t=0;
  Object.keys(progARR).forEach(function(pid){
    Object.keys(progARR[pid]).forEach(function(n){ t+=progARR[pid][n]||0; });
  });
  return t;
}

function podProgARR(pid){
  var t=0;
  if(progARR[pid]) Object.keys(progARR[pid]).forEach(function(n){ t+=progARR[pid][n]||0; });
  return t;
}

function updProgARR(pid,num,val){
  progARR[pid][num]=parseFloat(val.replace(/[$,]/g,''))||0;
  var el=document.getElementById('prog-tot-'+pid);
  if(el)el.textContent=fmt(podProgARR(pid));
  var mk=document.getElementById('mk-prog');
  if(mk)mk.textContent=fmt(totalProgARR());
  saveProg();
}

function updProgStatus(pid,num,val){
  progStatus[pid][num]=val;
  var el=document.getElementById('prog-st-'+pid+'-'+num);
  if(el){
    var cfg=statusCfg(val);
    el.style.background=cfg.bg;
    el.style.color=cfg.color;
    el.textContent=val;
  }
  saveProg();
}

function statusCfg(s){
  if(s==='Completed') return {bg:'#14532D33',color:'#22C55E'};
  if(s==='In Progress') return {bg:'#1E3A5F33',color:'#60A5FA'};
  return {bg:'#78350F33',color:'#F59E0B'};
}

function saveProg(){
  try{ localStorage.setItem('gtm_prog',JSON.stringify({arr:progARR,status:progStatus})); }catch(e){}
}
function loadProg(){
  try{
    var raw=localStorage.getItem('gtm_prog'); if(!raw)return;
    var d=JSON.parse(raw);
    if(d.arr) Object.keys(d.arr).forEach(function(pid){
      if(!progARR[pid])return;
      Object.keys(d.arr[pid]).forEach(function(n){ progARR[pid][n]=d.arr[pid][n]||0; });
    });
    if(d.status) Object.keys(d.status).forEach(function(pid){
      if(!progStatus[pid])return;
      Object.keys(d.status[pid]).forEach(function(n){ progStatus[pid][n]=d.status[pid][n]||progStatus[pid][n]; });
    });
  }catch(e){}
}
loadProg();

function renderProg(pod){
  var pid=pod.id;
  if(!PROGS[pid]) return '';
  var progs=PROGS[pid];
  var rows=progs.map(function(p){
    var st=progStatus[pid][p.num]||p.status;
    var cfg=statusCfg(st);
    var arr=progARR[pid][p.num]||0;
    return '<tr>'+
      '<td style="color:var(--mut);font-size:10px">'+p.num+'</td>'+
      '<td style="font-weight:600;font-size:11px;max-width:140px">'+p.strategy+'</td>'+
      '<td style="color:var(--mut);font-size:10px;max-width:200px">'+p.desc+'</td>'+
      '<td style="color:var(--mut);font-size:10px;white-space:nowrap">'+p.weeks+'</td>'+
      '<td><select data-pid="'+pid+'" data-num="'+p.num+'" onchange="updProgStatus(this.dataset.pid,this.dataset.num,this.value)" style="background:'+cfg.bg+';color:'+cfg.color+';border:1px solid '+cfg.color+'44;border-radius:12px;padding:2px 6px;font-size:10px;font-weight:600;cursor:pointer;outline:none">'+
        ['In Progress','Not Started','Completed'].map(function(o){return '<option value="'+o+'"'+(st===o?' selected':'')+'>'+o+'</option>';}).join('')+
      '</select></td>'+
      
      '<td><input class="ein" style="width:80px;border-color:#A78BFA44" value="'+(arr||'')+'" placeholder="$0" data-pid="'+pid+'" data-num="'+p.num+'" oninput="updProgARR(this.dataset.pid,this.dataset.num,this.value)"></td>'+
      +
      '</tr>';
  }).join('');

    '<span style="font-size:12px;font-weight:600">Strategic Moves Tracker &mdash; April 2026</span>'+

}


// ── Export / Import ──────────────────────────────────────────────────────
function exportData(){
  var data = {
    version: 1,
    exported: new Date().toISOString(),
    pods: PODS.map(function(p){
      return {
        id: p.id,
        sdrs: p.sdrs.map(function(s){
          return {name: s.name, rt: {darkRed:s.rt.darkRed, red:s.rt.red, amber:s.rt.amber, green:s.rt.green}};
        })
      };
    }),
    actuals: actuals,
    forecasts: forecasts,
    progARR: progARR,
    progStatus: progStatus
  };
  var blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'gtm-dashboard-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importData(input){
  var file = input.files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(e){
    try{
      var d = JSON.parse(e.target.result);
      // Restore rooftops
      if(d.pods) d.pods.forEach(function(pd){
        var pod = PODS.filter(function(p){return p.id===pd.id;})[0];
        if(!pod) return;
        pd.sdrs.forEach(function(sd){
          var s = pod.sdrs.filter(function(x){return x.name===sd.name;})[0];
          if(s && sd.rt){
            s.rt.darkRed = sd.rt.darkRed||0;
            s.rt.red     = sd.rt.red||0;
            s.rt.amber   = sd.rt.amber||0;
            s.rt.green   = sd.rt.green||0;
          }
        });
      });
      // Restore actuals
      if(d.actuals) Object.keys(d.actuals).forEach(function(pid){
        if(!actuals[pid]) return;
        Object.keys(d.actuals[pid]).forEach(function(wid){
          if(!actuals[pid][wid]) return;
          Object.keys(d.actuals[pid][wid]).forEach(function(n){
            actuals[pid][wid][n] = d.actuals[pid][wid][n]||0;
          });
        });
      });
      // Restore forecasts
      if(d.forecasts) Object.keys(d.forecasts).forEach(function(pid){
        if(!forecasts[pid]) return;
        Object.keys(d.forecasts[pid]).forEach(function(wid){
          if(!forecasts[pid][wid]) return;
          Object.keys(d.forecasts[pid][wid]).forEach(function(n){
            forecasts[pid][wid][n] = d.forecasts[pid][wid][n]||0;
          });
        });
      });
      // Restore programme ARR
      if(d.progARR) Object.keys(d.progARR).forEach(function(pid){
        if(!progARR[pid]) return;
        Object.keys(d.progARR[pid]).forEach(function(n){
          progARR[pid][n] = d.progARR[pid][n]||0;
        });
      });
      // Restore programme status
      if(d.progStatus) Object.keys(d.progStatus).forEach(function(pid){
        if(!progStatus[pid]) return;
        Object.keys(d.progStatus[pid]).forEach(function(n){
          progStatus[pid][n] = d.progStatus[pid][n]||progStatus[pid][n];
        });
      });
      // Save to localStorage
      save(); saveProg();
      // Re-render everything
      renderMKPI(); renderPodTbl(); updCharts(); renderPods();
      // Show success message
      var msg = document.getElementById('importMsg');
      if(msg){ msg.style.display='inline'; setTimeout(function(){msg.style.display='none';}, 3000); }
    } catch(err){
      alert('Import failed: ' + err.message);
    }
    input.value = '';
  };
  reader.readAsText(file);
}

renderMKPI();
renderPodTbl();
buildCharts();
renderPods();
